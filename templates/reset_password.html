{% extends "base.html" %}

{% block body_attrs %} class="dark-page"{% endblock %}

{% block content %}

<div class="home-title">
    <span class="logo">🔐</span>
    <h1>ORTHOQUIZZ</h1>
    <p class="tagline">Choisis un nouveau mot de passe</p>
</div>

<div class="form-box">
    <h2>Nouveau mot de passe</h2>
    <form method="POST">
        {{ form.hidden_tag() }}
        <label>Nouveau mot de passe</label>
        <input type="password" name="password" placeholder="6 caractères minimum" required minlength="6" autofocus>
        <label>Confirme le mot de passe</label>
        <input type="password" name="password_confirm" placeholder="••••••" required minlength="6">
        <button type="submit" class="action-btn">✅ Enregistrer</button>
    </form>
</div>

{% endblock %}
