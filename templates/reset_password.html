{% extends "base.html" %}

{% block body_attrs %} class="dark-page"{% endblock %}

{% block content %}

<div class="home-title">
    <span class="logo">🔐</span>
    <h1>ORTHOQUIZZ</h1>
    <p class="tagline">Choisis un nouveau mot de passe</p>
</div>

<div class="form-box">
    <h2>Nouveau mot de passe</h2>
    <form method="POST">
        {{ form.hidden_tag() }}
        <label>Nouveau mot de passe</label>
        <input type="password" name="password" placeholder="Entre 6 et 20 caractères" required minlength="6" maxlength="20" autofocus>
        <p style="font-size:12px; color:rgba(255,255,255,0.55); margin:-6px 0 10px; line-height:1.5;">
            Entre 6 et 20 caractères.
        </p>
        <label>Confirme le mot de passe</label>
        <input type="password" name="password_confirm" placeholder="••••••" required minlength="6" maxlength="20">
        <button type="submit" class="action-btn">✅ Enregistrer</button>
    </form>
</div>

{% endblock %}
