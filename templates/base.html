<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrthoQuizz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #357abd; }
        .messages { margin-bottom: 20px; }
        .error   { color: #e74c3c; background: #fdf0ef; padding: 10px; border-radius: 6px; margin: 4px 0; }
        .success { color: #27ae60; background: #eafaf1; padding: 10px; border-radius: 6px; margin: 4px 0; }
        a { color: #4a90e2; }

        /* ===== DARK THEME PARTAGÉ ===== */
        body.dark-page { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; min-height: 100vh; }
        body.dark-page .card { background: transparent !important; box-shadow: none !important; padding: 16px !important; max-width: 400px; }

        .home-title { text-align: center; margin-bottom: 14px; }
        .home-title .logo { font-size: 48px; display: block; margin-bottom: 4px; filter: drop-shadow(0 0 14px rgba(255,215,0,0.7)); animation: logo-float 3s ease-in-out infinite; }
        @keyframes logo-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .home-title h1 { font-size: 26px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.5); margin: 0 0 2px 0; letter-spacing: 2px; }
        .home-title .tagline { font-size: 13px; color: rgba(255,255,255,0.6); font-style: italic; }

        .perks { display: flex; justify-content: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
        .perk { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: rgba(255,255,255,0.7); }

        .form-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
        .form-box h2 { color: white; font-size: 16px; font-weight: 700; margin: 0 0 14px 0; text-align: center; letter-spacing: 1px; text-transform: uppercase; opacity: 0.8; }
        .form-box label { display: block; font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .form-box input, .form-box select { background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 8px !important; color: white !important; font-size: 16px !important; padding: 10px 12px !important; margin-bottom: 12px !important; width: 100%; box-sizing: border-box; }
        .form-box select option { background: #1a1a2e; color: white; }
        .form-box input::placeholder { color: rgba(255,255,255,0.3); }
        .form-box input:focus, .form-box select:focus { outline: none !important; border-color: rgba(255,215,0,0.5) !important; background: rgba(255,255,255,0.14) !important; }

        .action-btn { width: 100%; background: linear-gradient(135deg, #f7c948, #f0a500) !important; color: #1a1a1a !important; border: 3px solid #c47f00 !important; padding: 14px !important; border-radius: 10px !important; font-size: 17px !important; font-weight: 900 !important; cursor: pointer; letter-spacing: 0.5px; margin-top: 4px !important; }
        .action-btn:hover { background: linear-gradient(135deg, #ffe066, #f7c948) !important; }

        .subtle-link { text-align: center; margin-top: 14px; font-size: 13px; color: rgba(255,255,255,0.5); }
        .subtle-link a { color: #FFD700 !important; font-weight: bold; text-decoration: none; }
        .subtle-link a:hover { text-decoration: underline; }

        .admin-link { display: block; text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2) !important; text-decoration: none; }
        .admin-link:hover { color: rgba(255,255,255,0.45) !important; }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="messages">
                {% for category, message in messages %}
                    <div class="{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
